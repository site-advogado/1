  <title>Minha Linha do Tempo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8sq8OlCkdoqcuQ1KGpfL7O+L6fGCSeT9w+FMSwn1SRzwxD" crossorigin="anonymous">
  <style>
    :root {
      --navy:        #0A1628;
      --navyMid:     #111E35;
      --navyLight:   #1C2D4A;
      --steel:       #2E6DA4;
      --steelLight:  #4A8DC4;
      --steelDim:    #1A4A72;
      --iceWhite:    #E8EDF4;
      --silverFog:   #9AADC4;
      --gunmetal:    #2C3344;
      --bg:          #F0F4F8;
      --surface:     #FFFFFF;
      --text-primary:    #0A1628;
      --text-secondary:  rgba(10,22,40,0.60);
      --text-disabled:   rgba(10,22,40,0.30);
      --border-color:    rgba(46,109,164,0.12);
      --border-hover:    rgba(46,109,164,0.25);
      --error:       #C04A3A;
      --overlay:     rgba(10,22,40,0.50);
      --font-serif:  'Cormorant Garamond', Georgia, serif;
      --font-sans:   'Inter', sans-serif;
      --radius-card: 16px;
      --radius-btn:  12px;
      --radius-sm:   8px;
      --radius-badge: 4px;
    }

    html.dark {
      --bg:          #0A1628;
      --surface:     #111E35;
      --text-primary:    #E8EDF4;
      --text-secondary:  rgba(232,237,244,0.60);
      --text-disabled:   rgba(232,237,244,0.30);
      --border-color:    rgba(46,109,164,0.20);
      --border-hover:    rgba(46,109,164,0.35);
      --error:       #E07060;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 300;
      line-height: 1.625;
      color: var(--text-primary);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(46,109,164,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,109,164,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      transition: background-color 0.3s, color 0.3s;
      user-select: none;
      min-height: 100vh;
      overflow-x: hidden;
    }
    html.dark body {
      background-image:
        linear-gradient(rgba(46,109,164,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,109,164,0.08) 1px, transparent 1px);
    }

    input, textarea { user-select: text !important; -webkit-user-select: text !important; }
    img { pointer-events: none !important; -webkit-user-drag: none !important; }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.15;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    h2 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    h3 {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .section-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(46,109,164,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(46,109,164,0.45); }

    /* ── Global Loader ── */
    #globalLoader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      backdrop-filter: blur(10px);
      transition: opacity 0.4s;
      /* Começa visível — JS esconde via _hideLoader() */
    }
    #globalLoader[style*="display: none"] { display: none !important; }
    .loader-box {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .loader-ring {
      width: 38px; height: 38px;
      border: 3px solid rgba(46,109,164,0.15);
      border-top: 3px solid #2E6DA4;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loader-txt {
      font-size: 10px; font-weight: 500; letter-spacing: 0.25em;
      text-transform: uppercase; color: #2E6DA4;
    }

    /* ── Header ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(240,244,248,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(46,109,164,0.18);
    }
    html.dark header {
      background: rgba(10,22,40,0.92);
      border-bottom-color: rgba(46,109,164,0.25);
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; }
    .hdr-icon {
      width: 34px; height: 34px;
      border: 1px solid rgba(46,109,164,0.28);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .hdr-icon i { color: #2E6DA4; font-size: 13px; }
    html.dark .hdr-icon i { color: #4A8DC4; }
    .hdr-title {
      font-family: var(--font-sans);
      font-size: 12px; letter-spacing: 0.2em;
      color: var(--text-secondary); text-transform: uppercase;
      font-weight: 500;
    }
    .hdr-actions { display: flex; align-items: center; gap: 8px; }
    .btn-icon {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: 1px solid rgba(46,109,164,0.25);
      border-radius: var(--radius-sm);
      color: #2E6DA4;
      cursor: pointer; font-size: 12px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-icon:hover {
      background: rgba(46,109,164,0.08);
      border-color: rgba(46,109,164,0.45);
    }
    html.dark .btn-icon { color: #4A8DC4; border-color: rgba(74,141,196,0.25); }
    .btn-sair {
      padding: 6px 14px; background: none;
      border: 1px solid rgba(192,74,58,0.30);
      border-radius: var(--radius-sm);
      font-size: 10px; letter-spacing: 0.14em;
      color: var(--error);
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
      font-family: var(--font-sans); font-weight: 500;
    }
    .btn-sair:hover { background: rgba(192,74,58,0.08); }

    /* ── Main ── */
    main {
      position: relative; z-index: 1;
      padding: 86px 20px 60px;
      max-width: 520px; margin: 0 auto;
    }

    /* ── Boas-vindas ── */
    .welcome { text-align: center; margin-bottom: 24px; }
    .welcome-eyebrow {
      font-family: var(--font-sans);
      font-size: 10px; letter-spacing: 0.18em;
      color: var(--text-secondary); text-transform: uppercase;
      margin-bottom: 5px; font-weight: 600;
    }
    #clienteName {
      font-family: var(--font-serif);
      font-size: 22px; font-weight: 600;
      color: var(--text-primary);
    }
    #boasVindasMsg {
      font-family: var(--font-serif);
      font-size: 13px; font-style: italic;
      color: var(--text-secondary);
      margin-top: 5px; line-height: 1.6;
    }

    /* ── Banner processo finalizado ── */
    #bannerFinalizado {
      display: none;
      background: rgba(46,109,164,0.06);
      border: 1px solid rgba(46,109,164,0.22);
      border-left: 3px solid rgba(46,109,164,0.55);
      border-radius: var(--radius-sm);
      padding: 12px 16px; margin-bottom: 16px;
      gap: 10px; align-items: center;
    }
    html.dark #bannerFinalizado {
      background: rgba(46,109,164,0.10);
      border-color: rgba(74,141,196,0.20);
      border-left-color: rgba(74,141,196,0.55);
    }
    #bannerFinalizado i { color: #2E6DA4; font-size: 16px; flex-shrink: 0; }
    html.dark #bannerFinalizado i { color: #4A8DC4; }
    #bannerFinalizado p { font-size: 12px; color: #2E6DA4; line-height: 1.5; }
    html.dark #bannerFinalizado p { color: #4A8DC4; }

    /* ── Banner prazo ── */
    .prazo-banner {
      border-radius: var(--radius-sm);
      padding: 10px 14px; margin-bottom: 14px;
      gap: 9px; align-items: center;
      font-size: 12px; font-weight: 500;
      font-family: var(--font-sans);
    }
    .prazo-banner.vencido  {
      display: flex;
      background: rgba(192,74,58,0.08);
      border: 1px solid rgba(192,74,58,0.30);
      color: var(--error);
    }
    .prazo-banner.hoje {
      display: flex;
      background: rgba(46,109,164,0.08);
      border: 1px solid rgba(46,109,164,0.35);
      color: #2E6DA4;
    }
    .prazo-banner.urgente {
      display: flex;
      background: rgba(46,109,164,0.06);
      border: 1px solid rgba(46,109,164,0.25);
      color: #1A4A72;
    }
    html.dark .prazo-banner.urgente { color: #4A8DC4; }
    .prazo-banner.proximo {
      display: flex;
      background: rgba(46,109,164,0.06);
      border: 1px solid rgba(46,109,164,0.20);
      color: #2E6DA4;
    }
    .prazo-banner.normal {
      display: flex;
      background: rgba(46,109,164,0.04);
      border: 1px solid rgba(46,109,164,0.15);
      color: var(--text-secondary);
    }

    /* ── Carrossel ── */
    #carouselWrap { margin-bottom: 6px; }
    #processCarousel {
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      gap: 12px; padding: 4px 0 8px;
      scrollbar-width: none; cursor: grab;
    }
    #processCarousel:active { cursor: grabbing; }
    #processCarousel::-webkit-scrollbar { display: none; }
    #processCarousel.single { justify-content: center; cursor: default; }

    .proc-card {
      flex: 0 0 85%; scroll-snap-align: center;
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 18px; position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.25s, box-shadow 0.3s;
      cursor: pointer;
      box-shadow: 0 2px 20px rgba(10,22,40,0.08);
    }
    html.dark .proc-card { box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
    .proc-card::before {
      content: ''; position: absolute; top: 0; left: 10px; right: 10px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(46,109,164,0.40), transparent);
      opacity: 0.6;
    }
    .proc-card.active {
      border-color: rgba(46,109,164,0.45);
      transform: scale(1.01);
      box-shadow: 0 6px 28px rgba(46,109,164,0.18);
    }
    .proc-card.single-card { flex: 0 0 100%; cursor: default; }
    .pc-eyebrow {
      font-size: 9px; font-weight: 600; letter-spacing: 0.22em;
      color: var(--text-secondary); text-transform: uppercase; margin-bottom: 3px;
    }
    .pc-num {
      font-family: var(--font-serif);
      font-size: 14px; font-weight: 400; color: var(--text-primary);
    }
    .pc-obs {
      font-size: 11px; color: var(--text-secondary);
      margin-top: 8px; display: flex; align-items: center; gap: 6px;
    }

    /* Dots */
    #carouselDots { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
    #carouselDots.hidden { display: none; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2E6DA4; opacity: 0.25;
      transition: opacity 0.3s, transform 0.3s; cursor: pointer;
    }
    .dot.active { opacity: 1; transform: scale(1.4); }

    /* ── Status cards ── */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 14px;
      box-shadow: 0 2px 20px rgba(10,22,40,0.08);
      position: relative;
    }
    html.dark .status-card { box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
    .status-card.wide { grid-column: 1 / -1; }
    .status-card::before {
      content: ''; display: block; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(46,109,164,0.30), transparent);
      margin-bottom: 10px;
    }
    .sc-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.2em;
      color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sc-ping {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2E6DA4;
      animation: ping 1.5s infinite;
    }
    @keyframes ping { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(1.4);} }
    .sc-value {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 400;
      color: var(--text-primary); line-height: 1.3;
    }

    /* ── Progresso circular ── */
    .progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .progress-svg { width: 64px; height: 64px; transform: rotate(-90deg); }
    .progress-pct {
      font-family: var(--font-serif);
      font-size: 12px; font-weight: 600; color: #2E6DA4;
    }
    html.dark .progress-pct { color: #4A8DC4; }
    .progress-fase { font-size: 10px; color: var(--text-secondary); text-align: center; margin-top: 3px; }

    /* ── Documentos ── */
    .docs-section { margin-bottom: 20px; }
    .docs-title {
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
      color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px;
    }
    .docs-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .doc-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      background: rgba(46,109,164,0.06);
      border: 1px solid rgba(46,109,164,0.20);
      border-radius: var(--radius-sm);
      font-size: 11px; color: #2E6DA4;
      text-decoration: none; cursor: pointer;
      transition: all 0.2s; max-width: 200px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: var(--font-sans); font-weight: 500;
    }
    .doc-btn i { font-size: 12px; flex-shrink: 0; }
    .doc-btn:hover {
      background: linear-gradient(135deg, #2E6DA4 0%, #1A4A72 100%);
      color: #fff; border-color: #2E6DA4;
    }
    html.dark .doc-btn { color: #4A8DC4; border-color: rgba(74,141,196,0.25); background: rgba(74,141,196,0.08); }

    /* ── Botão imprimir ── */
    .btn-print {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 16px; margin-bottom: 20px; margin-left: auto;
      background: none;
      border: 1px solid rgba(46,109,164,0.25);
      border-radius: var(--radius-sm);
      font-size: 10px; letter-spacing: 0.14em;
      color: var(--text-secondary);
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
      font-family: var(--font-sans); font-weight: 500;
    }
    .btn-print:hover {
      border-color: #2E6DA4; color: #2E6DA4;
      background: rgba(46,109,164,0.06);
    }

    /* ── Timeline ── */
    .tl-section { position: relative; }
    .tl-section-title {
      font-family: var(--font-sans);
      font-size: 10px; letter-spacing: 0.22em;
      color: var(--text-secondary); text-transform: uppercase;
      font-weight: 600;
      text-align: center; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .tl-section-title::before,
    .tl-section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(46,109,164,0.25));
    }
    .tl-section-title::after {
      background: linear-gradient(270deg, transparent, rgba(46,109,164,0.25));
    }
    .tl-line {
      position: absolute; left: 15px; top: 0; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, #2E6DA4, transparent);
      opacity: 0.2;
    }
    #timelineContainer {
      position: relative; padding-left: 40px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .tl-item {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 16px; position: relative;
      animation: fadeUp 0.4s ease both;
      box-shadow: 0 2px 20px rgba(10,22,40,0.08);
    }
    html.dark .tl-item { box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
    .tl-item::before {
      content: ''; position: absolute; top: 0; left: 8px; right: 8px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(46,109,164,0.30), transparent);
      opacity: 0.5;
    }
    .tl-item.ultimo {
      border-color: rgba(46,109,164,0.38);
      box-shadow: 0 4px 24px rgba(46,109,164,0.14);
    }
    .tl-item.finalizado {
      border-color: rgba(46,109,164,0.30);
      background: rgba(46,109,164,0.03);
    }
    html.dark .tl-item.finalizado { background: rgba(46,109,164,0.06); }
    .tl-item.finalizado::before {
      background: linear-gradient(90deg, transparent, rgba(46,109,164,0.35), transparent);
    }
    .tl-dot {
      position: absolute; left: -31px; top: 18px;
      width: 12px; height: 12px;
      border: 1px solid rgba(46,109,164,0.55);
      background: linear-gradient(135deg, #2E6DA4, #1A4A72);
      border-radius: 50%;
    }
    .tl-dot.finalizado {
      background: linear-gradient(135deg, #2E6DA4, #1A4A72);
      border-color: #2E6DA4;
    }
    .tl-date {
      font-size: 9px; font-weight: 600; letter-spacing: 0.2em;
      color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px;
    }
    .tl-status {
      font-family: var(--font-serif);
      font-size: 15px; font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .tl-desc {
      font-family: var(--font-serif);
      font-size: 14px; font-style: italic; font-weight: 300;
      color: var(--text-secondary); line-height: 1.65;
    }
    .glossario-btn {
      background: none; border: none; cursor: pointer;
      color: #2E6DA4; opacity: 0.55;
      font-size: 12px; padding: 1px 3px; transition: opacity 0.2s;
    }
    .glossario-btn:hover { opacity: 1; }
    html.dark .glossario-btn { color: #4A8DC4; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(46,109,164,0.30), transparent);
      margin: 24px 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    /* ── Print ── */
    @media print {
      header, .btn-sair, .btn-icon, .btn-print,
      #carouselDots, .glossario-btn, #bannerFinalizado { display: none !important; }
      body { background: white !important; color: black !important; background-image: none !important; }
      main { padding-top: 20px !important; }
      .tl-item { break-inside: avoid; }
    }
  </style>
</head>
<body>

<div id="globalLoader">
  <div class="loader-box">
    <div class="loader-ring"></div>
    <span class="loader-txt">Sincronizando</span>
  </div>
</div>

<header>
  <div class="hdr-brand">
    <div class="hdr-icon"><i class="fas fa-shield-halved"></i></div>
    <span class="hdr-title">Área Segura</span>
  </div>
  <div class="hdr-actions">
    <button class="btn-icon" id="themeToggle" onclick="toggleDarkMode()"><i id="themeIcon" class="fas fa-moon"></i></button>
    <button class="btn-sair" onclick="logout()">Sair</button>
  </div>
</header>

<main>

  <!-- Boas-vindas -->
  <div class="welcome">
    <p class="welcome-eyebrow">Bem-vindo(a)</p>
    <h2 id="clienteName">...</h2>
    <p id="boasVindasMsg"></p>
  </div>

  <!-- Banner processo finalizado -->
  <div id="bannerFinalizado">
    <i class="fas fa-circle-check"></i>
    <p><strong>Processo Finalizado</strong> — Seu processo foi concluído com êxito. Todos os registros permanecem disponíveis para consulta.</p>
  </div>

  <!-- Banner prazo -->
  <div id="prazoBanner" style="display:none;"></div>

  <!-- Carrossel -->
  <div id="carouselWrap">
    <div id="processCarousel"></div>
  </div>
  <div id="carouselDots" class="hidden"></div>

  <!-- Status cards -->
  <div class="status-grid">
    <div class="status-card wide">
      <div class="sc-label">Status Atual <span class="sc-ping"></span></div>
      <div class="sc-value" id="statusAtual">...</div>
    </div>
    <div class="status-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="sc-label" style="width:100%;justify-content:center;">Progresso</div>
      <div class="progress-wrap">
        <svg class="progress-svg" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26"
            stroke="rgba(46,109,164,0.18)" stroke-width="4" fill="none"/>
          <circle id="progressCircle" cx="32" cy="32" r="26"
            stroke="#2E6DA4" stroke-width="4" fill="none"
            stroke-dasharray="163.4" stroke-dashoffset="163.4"
            stroke-linecap="round"
            style="transition: stroke-dashoffset 1s ease;"/>
        </svg>
        <span id="progressPct" class="progress-pct">0%</span>
      </div>
      <div id="faseLabel" class="progress-fase"></div>
    </div>
    <div class="status-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <div class="sc-label">Eventos</div>
      <div class="sc-value" id="eventCount" style="font-size:32px;">0</div>
      <div style="font-size:10px;color:var(--text-secondary);">registrados</div>
    </div>
  </div>

  <!-- Botão imprimir -->
  <button class="btn-print" onclick="window.print()">
    <i class="fas fa-print"></i> Imprimir / Salvar PDF
  </button>

  <!-- Documentos -->
  <div class="docs-section" id="docsSection" style="display:none;">
    <div class="docs-title"><i class="fas fa-paperclip" style="margin-right:6px;opacity:0.7;"></i>Documentos e Links</div>
    <div class="docs-list" id="docsList"></div>
  </div>

  <!-- Timeline -->
  <div class="tl-section">
    <div class="tl-section-title">Linha do Tempo</div>
    <div id="timelineContainer">
      <div class="tl-line"></div>
    </div>
  </div>

</main>

<script src="tema.js"></script>
<script>
// URL_API vem de tema.js — NÃO declarar aqui
let globalData = [];
let activeId   = null;
let scrollTimer = null;
let primeiroAcesso = true;

// ── Segurança: esconde loader após 8s mesmo se algo travar ──
let _loaderSafetyTimeout = setTimeout(_hideLoader, 8000);

// ── Init ──────────────────────────────────────────────────
async function init() {
  let sessao = null;

  // Protege contra ausência ou falha de verificarSessaoComTema no tema.js
  try {
    if (typeof verificarSessaoComTema === 'function') {
      sessao = await verificarSessaoComTema('cliente');
    } else {
      console.warn('[linha-tempo] verificarSessaoComTema não encontrada no tema.js');
    }
  } catch (err) {
    console.error('[linha-tempo] Erro em verificarSessaoComTema:', err);
  }

  if (!sessao) {
    _hideLoader();
    return;
  }

  try {
    const res  = await fetch(URL_API, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'timeline' }),
    });
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('clienteName').textContent = sessao.usuario || 'Usuário';
      document.getElementById('statusAtual').textContent  = 'Nenhum processo encontrado.';
      return;
    }

    globalData = data;

    const nomeCliente = data[0]?.cliente || sessao.usuario || '';
    document.getElementById('clienteName').textContent = nomeCliente;

    const msgEl = document.getElementById('boasVindasMsg');
    if (primeiroAcesso) {
      msgEl.textContent = `Este é o seu portal exclusivo de acompanhamento processual.`;
      primeiroAcesso = false;
    }

    renderCarousel();

  } catch (err) {
    console.error('[linha-tempo] Erro ao carregar dados:', err);
    document.getElementById('statusAtual').textContent = 'Erro ao carregar dados. Tente novamente.';
  } finally {
    _hideLoader();
  }
}

function _hideLoader() {
  clearTimeout(_loaderSafetyTimeout);
  const el = document.getElementById('globalLoader');
  if (!el || el.style.display === 'none') return;
  el.style.opacity = '0';
  setTimeout(() => { el.style.display = 'none'; }, 400);
}

// ── Carrossel ─────────────────────────────────────────────
function renderCarousel() {
  const carousel = document.getElementById('processCarousel');
  const dotsWrap = document.getElementById('carouselDots');
  const isSingle = globalData.length === 1;

  if (isSingle) {
    carousel.classList.add('single');
    dotsWrap.classList.add('hidden');
  } else {
    carousel.classList.remove('single');
    dotsWrap.classList.remove('hidden');
  }

  carousel.innerHTML = '';
  globalData.forEach((proc) => {
    const card = document.createElement('div');
    card.className = `proc-card${isSingle ? ' single-card' : ''}`;
    card.dataset.id = proc.id;

    const eyebrow = document.createElement('p');
    eyebrow.className = 'pc-eyebrow';
    eyebrow.textContent = proc.tipo_acao || 'Processo';

    const num = document.createElement('p');
    num.className = 'pc-num';
    num.textContent = proc.numero_processo || 'S/N';

    const obs = document.createElement('p');
    obs.className = 'pc-obs';
    const icon = document.createElement('i');
    icon.className = 'fas fa-circle-info';
    icon.style.cssText = 'color:rgba(46,109,164,0.5);font-size:10px;';
    const obsSpan = document.createElement('span');
    obsSpan.textContent = proc.obs || '';
    obs.append(icon, obsSpan);

    card.append(eyebrow, num, obs);
    if (!isSingle) card.addEventListener('click', () => selectProcess(proc.id));
    carousel.appendChild(card);
  });

  // Dots
  dotsWrap.innerHTML = '';
  if (!isSingle) {
    globalData.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.dataset.i  = i;
      dot.onclick = () => {
        const cards = carousel.querySelectorAll('.proc-card');
        if (cards[i]) cards[i].scrollIntoView({ behavior:'smooth', inline:'center' });
      };
      dotsWrap.appendChild(dot);
    });
    _setupCarouselScroll(carousel);
    _setupDraggable(carousel);
  }

  selectProcess(globalData[0].id);
}

function _setupCarouselScroll(carousel) {
  carousel.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      let closest = null, minOff = Infinity;
      carousel.querySelectorAll('.proc-card').forEach(card => {
        const off = Math.abs(card.getBoundingClientRect().left + card.getBoundingClientRect().width/2 - window.innerWidth/2);
        if (off < minOff) { minOff = off; closest = card; }
      });
      if (closest) selectProcess(closest.dataset.id);
    }, 80);
  });
}

function _setupDraggable(slider) {
  let isDown = false, startX, scrollLeft;
  slider.addEventListener('mousedown',  e => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
  slider.addEventListener('mouseleave', () => isDown = false);
  slider.addEventListener('mouseup',    () => isDown = false);
  slider.addEventListener('mousemove',  e => {
    if (!isDown) return;
    const walk = e.pageX - slider.offsetLeft - startX;
    if (Math.abs(walk) > 5) { e.preventDefault(); slider.scrollLeft = scrollLeft - walk; }
  });
}

// ── Selecionar processo ────────────────────────────────────
function selectProcess(id) {
  const proc = globalData.find(p => String(p.id) === String(id));
  if (!proc) return;
  activeId = String(id);

  document.querySelectorAll('.proc-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === activeId));

  const idx = globalData.findIndex(p => String(p.id) === activeId);
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));

  const ats   = Array.isArray(proc.atualizacoes) ? proc.atualizacoes : [];
  const ultimo = ats[ats.length - 1] || { status: 'Aguardando' };
  document.getElementById('statusAtual').textContent = ultimo.status;
  document.getElementById('eventCount').textContent  = ats.length;

  const finalizado = ultimo.status === 'Processo Finalizado / Arquivado';
  const bannerFin  = document.getElementById('bannerFinalizado');
  bannerFin.style.display = finalizado ? 'flex' : 'none';

  const pct    = parseInt(proc.fase_atual, 10) || 10;
  const circum = 2 * Math.PI * 26;
  document.getElementById('progressCircle').style.strokeDashoffset = circum * (1 - pct / 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('faseLabel').textContent   = getFaseLabel(pct);

  const prazoBanner = document.getElementById('prazoBanner');
  if (proc.prazo) {
    const info = labelPrazo(proc.prazo);
    if (info) {
      prazoBanner.className = 'prazo-banner ' + info.urgencia;
      // [ID-014] DOM seguro — sem innerHTML com dados do servidor
      prazoBanner.innerHTML = '';
      const _prazIcon = document.createElement('i');
      _prazIcon.className = 'fas fa-clock';
      _prazIcon.style.cssText = 'flex-shrink:0;';
      const _prazSpan = document.createElement('span');
      _prazSpan.textContent = info.texto; // textContent — XSS safe
      prazoBanner.append(_prazIcon, _prazSpan);
    } else { prazoBanner.style.display = 'none'; }
  } else { prazoBanner.style.display = 'none'; }

  const docs = Array.isArray(proc.documentos) ? proc.documentos.filter(d => d.nome && d.url) : [];
  const docsSection = document.getElementById('docsSection');
  const docsList    = document.getElementById('docsList');
  docsList.innerHTML = '';
  if (docs.length > 0) {
    docsSection.style.display = '';
    docs.forEach(doc => {
      const a = document.createElement('a');
      a.className  = 'doc-btn';
      // Validar URL antes de atribuir (apenas https://)
      if (doc.url && String(doc.url).startsWith('https://')) {
        a.href = doc.url;
      } else {
        a.href = '#';
      }
      a.target = '_blank';
      a.rel    = 'noopener noreferrer';
      // [ID-014] DOM seguro — sem innerHTML com dados do servidor
      const _docIcon = document.createElement('i');
      _docIcon.className = 'fas fa-file-lines';
      const span = document.createElement('span');
      span.textContent = doc.nome; // textContent — XSS safe
      a.append(_docIcon, span);
      docsList.appendChild(a);
    });
  } else { docsSection.style.display = 'none'; }

  _renderTimeline(ats, finalizado);
}

// ── Render timeline ────────────────────────────────────────
function _renderTimeline(ats, finalizado) {
  const container = document.getElementById('timelineContainer');
  // [ID-014] DOM seguro — estrutura estática criada via createElement
  container.innerHTML = '';
  const _tlLine = document.createElement('div');
  _tlLine.className = 'tl-line';
  container.appendChild(_tlLine);

  const GLOSSARIO_KEYS = new Set([
    'Petição Inicial Protocolada','Aguardando Citação',
    'Audiência de Conciliação Designada','Audiência de Instrução e Julgamento',
    'Sentença Proferida','Fase de Execução / Cálculos','Processo Finalizado / Arquivado',
  ]);

  [...ats].reverse().forEach((ev, i) => {
    const isUltimo     = i === 0;
    const isFinalizado = ev.status === 'Processo Finalizado / Arquivado';

    const item = document.createElement('div');
    item.className = `tl-item${isUltimo ? ' ultimo' : ''}${isFinalizado ? ' finalizado' : ''}`;
    item.style.animationDelay = `${i * 0.07}s`;

    const dot = document.createElement('div');
    dot.className = `tl-dot${isFinalizado ? ' finalizado' : ''}`;

    const dateRow = document.createElement('div');
    dateRow.className = 'tl-date';
    dateRow.textContent = formatDate(ev.data);

    const statusRow = document.createElement('div');
    statusRow.className = 'tl-status';

    const statusSpan = document.createElement('span');
    statusSpan.textContent = ev.status || '';
    statusRow.appendChild(statusSpan);

    if (isFinalizado) {
      const icon = document.createElement('i');
      icon.className = 'fas fa-circle-check';
      icon.style.cssText = `color:#2E6DA4;font-size:14px;`;
      statusRow.appendChild(icon);
    }

    if (GLOSSARIO_KEYS.has(ev.status)) {
      const gBtn = document.createElement('button');
      gBtn.className = 'glossario-btn';
      gBtn.title     = 'O que significa isso?';
      // [ID-014] DOM seguro — ícone estático criado sem innerHTML
      const _gIcon = document.createElement('i');
      _gIcon.className = 'fas fa-circle-question';
      gBtn.appendChild(_gIcon);
      gBtn.addEventListener('click', () => abrirGlossario(encodeURIComponent(ev.status)));
      statusRow.appendChild(gBtn);
    }

    const desc = document.createElement('p');
    desc.className   = 'tl-desc';
    desc.textContent = ev.descricao || '';

    item.append(dot, dateRow, statusRow, desc);
    container.appendChild(item);
  });
}

// ── Dark mode toggle ───────────────────────────────────────
function toggleDarkMode() {
  const isDark = document.documentElement.classList.contains('dark');
  const next = isDark ? 'light' : 'dark';
  document.documentElement.classList.toggle('dark', next === 'dark');
  document.documentElement.classList.toggle('light', next === 'light');
  localStorage.setItem('ADV_GLOBAL_THEME', next);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

// Aplicar tema salvo no carregamento
(function(){
  const saved = localStorage.getItem('ADV_GLOBAL_THEME') || 'light';
  document.documentElement.classList.toggle('dark', saved === 'dark');
  document.documentElement.classList.toggle('light', saved !== 'dark');
  document.addEventListener('DOMContentLoaded', function(){
    const icon = document.getElementById('themeIcon');
    if (icon) icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  });
})();

// [ID-016] Override de logout: invalida JWT no servidor (blocklist JTI)
// antes de redirecionar, garantindo revogação real do token
if (typeof logout === 'undefined' || typeof logout !== 'function') {
  window.logout = async function() {
    try {
      await fetch(typeof URL_API !== 'undefined' ? URL_API : '', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'logout' }),
      });
    } catch { /* falha silenciosa — redirecionar mesmo assim */ }
    window.location.href = './index.html';
  };
} else {
  // Garantir que o logout do tema.js também chame a rota de revogação
  const _origLogout = logout;
  window.logout = async function() {
    try {
      await fetch(typeof URL_API !== 'undefined' ? URL_API : '', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'logout' }),
      });
    } catch {}
    if (typeof _origLogout === 'function') _origLogout();
    else window.location.href = './index.html';
  };
}

document.addEventListener('DOMContentLoaded', init);
</script>
