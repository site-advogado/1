<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' https://blogger.googleusercontent.com data:; connect-src 'self' https://*.workers.dev;">
  <title>Minha Linha do Tempo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--t-font-sans, sans-serif);
      background: var(--t-bg, #FAF8F3);
      color: var(--t-text, #1C1917);
      min-height: 100vh; overflow-x: hidden;
      -webkit-user-select: none; user-select: none;
      transition: background 0.35s, color 0.35s;
    }
    input, textarea { -webkit-user-select: text !important; user-select: text !important; }
    img { pointer-events: none; -webkit-user-drag: none; }

    /* ── Loader ── */
    #globalLoader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: var(--t-bg, #FAF8F3); backdrop-filter: blur(10px);
      transition: opacity 0.4s;
    }
    .loader-box {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .loader-ring {
      width: 42px; height: 42px;
      border: 2px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-top-color: var(--t-accent, #C5A059);
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt {
      font-size: 10px; font-weight: 500; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--t-accent, #C5A059);
    }

    /* ── Header ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--t-bg-header, rgba(250,248,243,0.88));
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--t-accent-brd, rgba(197,160,89,0.22));
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; }
    .hdr-icon {
      width: 34px; height: 34px;
      border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius, 4px);
      display: flex; align-items: center; justify-content: center;
    }
    .hdr-icon i { color: var(--t-accent, #C5A059); font-size: 13px; }
    .hdr-title {
      font-family: var(--t-font-serif, serif);
      font-size: 12px; letter-spacing: 0.2em;
      color: var(--t-text-soft, #44403C); text-transform: uppercase;
    }
    .hdr-actions { display: flex; align-items: center; gap: 8px; }
    .btn-icon {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius, 4px); color: var(--t-accent, #C5A059);
      cursor: pointer; font-size: 12px; transition: background 0.2s;
    }
    .btn-icon:hover { background: var(--t-accent-dim, rgba(197,160,89,0.09)); }
    .btn-sair {
      padding: 6px 14px; background: none;
      border: 1px solid rgba(200,80,60,0.3); border-radius: var(--t-radius, 4px);
      font-size: 10px; letter-spacing: 0.14em; color: var(--t-danger, #E08070);
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    }
    .btn-sair:hover { background: var(--t-danger-bg, rgba(200,80,60,0.08)); }

    /* ── Main ── */
    main {
      position: relative; z-index: 1;
      padding: 86px 20px 60px;
      max-width: 520px; margin: 0 auto;
    }

    /* ── Boas-vindas ── */
    .welcome { text-align: center; margin-bottom: 24px; }
    .welcome-eyebrow {
      font-family: var(--t-font-serif, serif);
      font-size: 10px; letter-spacing: 0.35em;
      color: var(--t-accent, #C5A059); text-transform: uppercase; margin-bottom: 5px;
    }
    #clienteName {
      font-family: var(--t-font-serif, serif);
      font-size: 22px; font-weight: 600; color: var(--t-text, #1C1917);
    }
    #boasVindasMsg {
      font-family: var(--t-font-serif, serif);
      font-size: 13px; font-style: italic;
      color: var(--t-text-muted, #A8A29E);
      margin-top: 5px; line-height: 1.6;
    }

    /* ── Banner processo finalizado ── */
    #bannerFinalizado {
      display: none;
      background: var(--t-success-bg, rgba(58,120,80,0.08));
      border: 1px solid var(--t-success, #60B080);
      border-left: 3px solid var(--t-success, #60B080);
      border-radius: var(--t-radius, 4px);
      padding: 12px 16px; margin-bottom: 16px;
      gap: 10px; align-items: center;
    }
    #bannerFinalizado i { color: var(--t-success, #60B080); font-size: 16px; flex-shrink: 0; }
    #bannerFinalizado p { font-size: 12px; color: var(--t-success, #60B080); line-height: 1.5; }

    /* ── Banner prazo ── */
    .prazo-banner {
      border-radius: var(--t-radius, 4px);
      padding: 10px 14px; margin-bottom: 14px;
      gap: 9px; align-items: center;
      font-size: 12px; font-weight: 500;
    }
    .prazo-banner.vencido  { display:flex; background: var(--t-danger-bg, rgba(200,80,60,0.08)); border: 1px solid var(--t-danger, #E08070); color: var(--t-danger, #E08070); }
    .prazo-banner.hoje     { display:flex; background: rgba(197,160,89,0.12); border: 1px solid var(--t-accent, #C5A059); color: var(--t-accent, #C5A059); }
    .prazo-banner.urgente  { display:flex; background: rgba(197,130,40,0.08); border: 1px solid rgba(197,130,40,0.5); color: #C07830; }
    .prazo-banner.proximo  { display:flex; background: var(--t-accent-dim, rgba(197,160,89,0.09)); border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28)); color: var(--t-accent, #C5A059); }
    .prazo-banner.normal   { display:flex; background: var(--t-accent-dim, rgba(197,160,89,0.09)); border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28)); color: var(--t-text-soft, #44403C); }

    /* ── Carrossel ── */
    #carouselWrap { margin-bottom: 6px; }
    #processCarousel {
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      gap: 12px; padding: 4px 0 8px;
      scrollbar-width: none; cursor: grab;
    }
    #processCarousel:active { cursor: grabbing; }
    #processCarousel::-webkit-scrollbar { display: none; }
    #processCarousel.single { justify-content: center; cursor: default; }

    .proc-card {
      flex: 0 0 85%; scroll-snap-align: center;
      background: var(--t-bg-card, rgba(255,255,255,0.72));
      backdrop-filter: blur(12px);
      border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius-lg, 4px);
      padding: 18px; position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.25s;
      cursor: pointer;
      box-shadow: var(--t-shadow, 0 2px 16px rgba(0,0,0,0.05));
    }
    .proc-card::before {
      content: ''; position: absolute; top: 0; left: 10px; right: 10px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #C5A059), transparent);
      opacity: 0.5;
    }
    .proc-card.active {
      border-color: var(--t-accent, #C5A059);
      transform: scale(1.01);
      box-shadow: 0 6px 28px rgba(197,160,89,0.12);
    }
    .proc-card.single-card { flex: 0 0 100%; cursor: default; }
    .pc-eyebrow {
      font-size: 9px; font-weight: 500; letter-spacing: 0.22em;
      color: var(--t-accent, #C5A059); text-transform: uppercase; margin-bottom: 3px;
    }
    .pc-num {
      font-family: var(--t-font-serif, serif);
      font-size: 14px; font-weight: 400; color: var(--t-text, #1C1917);
    }
    .pc-obs {
      font-size: 11px; color: var(--t-text-muted, #A8A29E);
      margin-top: 8px; display: flex; align-items: center; gap: 6px;
    }

    /* Dots — ocultos quando 1 processo */
    #carouselDots { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
    #carouselDots.hidden { display: none; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--t-accent, #C5A059); opacity: 0.25;
      transition: opacity 0.3s, transform 0.3s; cursor: pointer;
    }
    .dot.active { opacity: 1; transform: scale(1.4); }

    /* ── Status cards ── */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
    .status-card {
      background: var(--t-bg-card, rgba(255,255,255,0.72));
      backdrop-filter: blur(12px);
      border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius-lg, 4px);
      padding: 14px;
      box-shadow: var(--t-shadow, 0 2px 16px rgba(0,0,0,0.05));
    }
    .status-card.wide { grid-column: 1 / -1; }
    .status-card::before {
      content: ''; display: block; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #C5A059), transparent);
      margin-bottom: 10px;
    }
    .sc-label {
      font-size: 9px; font-weight: 500; letter-spacing: 0.2em;
      color: var(--t-accent, #C5A059); text-transform: uppercase; margin-bottom: 5px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sc-ping {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--t-accent, #C5A059);
      animation: ping 1.5s infinite;
    }
    @keyframes ping { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(1.4);} }
    .sc-value {
      font-family: var(--t-font-serif, serif);
      font-size: 16px; font-weight: 400; color: var(--t-text, #1C1917); line-height: 1.3;
    }

    /* ── Progresso circular ── */
    .progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .progress-svg { width: 64px; height: 64px; transform: rotate(-90deg); }
    .progress-pct {
      font-family: var(--t-font-serif, serif);
      font-size: 12px; font-weight: 600; color: var(--t-accent, #C5A059);
    }
    .progress-fase { font-size: 10px; color: var(--t-text-muted, #A8A29E); text-align: center; margin-top: 3px; }

    /* ── Documentos ── */
    .docs-section { margin-bottom: 20px; }
    .docs-title {
      font-size: 10px; font-weight: 500; letter-spacing: 0.22em;
      color: var(--t-accent, #C5A059); text-transform: uppercase; margin-bottom: 10px;
    }
    .docs-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .doc-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      background: var(--t-accent-dim, rgba(197,160,89,0.09));
      border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius, 4px);
      font-size: 11px; color: var(--t-accent, #C5A059);
      text-decoration: none; cursor: pointer;
      transition: all 0.2s; max-width: 200px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-btn i { font-size: 12px; flex-shrink: 0; }
    .doc-btn:hover {
      background: var(--t-accent, #C5A059);
      color: #fff; border-color: var(--t-accent, #C5A059);
    }

    /* ── Botão imprimir ── */
    .btn-print {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 16px; margin-bottom: 20px; margin-left: auto;
      background: none;
      border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius, 4px);
      font-size: 10px; letter-spacing: 0.14em; color: var(--t-text-muted, #A8A29E);
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    }
    .btn-print:hover { border-color: var(--t-accent, #C5A059); color: var(--t-accent, #C5A059); }

    /* ── Timeline ── */
    .tl-section { position: relative; }
    .tl-section-title {
      font-family: var(--t-font-serif, serif);
      font-size: 11px; letter-spacing: 0.3em;
      color: var(--t-accent, #C5A059); text-transform: uppercase;
      text-align: center; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .tl-section-title::before,
    .tl-section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--t-accent-brd, rgba(197,160,89,0.28)));
    }
    .tl-section-title::after {
      background: linear-gradient(270deg, transparent, var(--t-accent-brd, rgba(197,160,89,0.28)));
    }
    .tl-line {
      position: absolute; left: 15px; top: 0; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, var(--t-accent, #C5A059), transparent);
      opacity: 0.2;
    }
    #timelineContainer {
      position: relative; padding-left: 40px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .tl-item {
      background: var(--t-bg-card, rgba(255,255,255,0.72));
      backdrop-filter: blur(12px);
      border: 1px solid var(--t-accent-brd, rgba(197,160,89,0.28));
      border-radius: var(--t-radius-lg, 4px);
      padding: 16px; position: relative;
      animation: fadeUp 0.4s ease both;
      box-shadow: var(--t-shadow, 0 2px 16px rgba(0,0,0,0.05));
    }
    .tl-item::before {
      content: ''; position: absolute; top: 0; left: 8px; right: 8px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #C5A059), transparent);
      opacity: 0.35;
    }
    /* Destaque especial para último card */
    .tl-item.ultimo {
      border-color: var(--t-accent, #C5A059);
      box-shadow: 0 4px 24px rgba(197,160,89,0.1);
    }
    /* Destaque processo finalizado */
    .tl-item.finalizado {
      border-color: var(--t-success, #60B080);
      background: var(--t-success-bg, rgba(58,120,80,0.05));
    }
    .tl-item.finalizado::before {
      background: linear-gradient(90deg, transparent, var(--t-success, #60B080), transparent);
    }
    .tl-dot {
      position: absolute; left: -31px; top: 18px;
      width: 12px; height: 12px;
      border: 1px solid var(--t-accent, #C5A059);
      background: linear-gradient(135deg, var(--t-accent, #C5A059), var(--t-accent-dk, #9A7535));
      border-radius: 50%;
    }
    .tl-dot.finalizado { background: linear-gradient(135deg, var(--t-success, #60B080), #3A7A50); border-color: var(--t-success, #60B080); }
    .tl-date {
      font-size: 9px; font-weight: 500; letter-spacing: 0.2em;
      color: var(--t-accent, #C5A059); text-transform: uppercase; margin-bottom: 5px;
    }
    .tl-status {
      font-family: var(--t-font-serif, serif);
      font-size: 15px; font-weight: 400; color: var(--t-text, #1C1917);
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .tl-desc {
      font-family: var(--t-font-serif, serif);
      font-size: 14px; font-style: italic; font-weight: 300;
      color: var(--t-text-soft, #44403C); line-height: 1.65;
    }
    .glossario-btn {
      background: none; border: none; cursor: pointer;
      color: var(--t-accent, #C5A059); opacity: 0.55;
      font-size: 12px; padding: 1px 3px; transition: opacity 0.2s;
    }
    .glossario-btn:hover { opacity: 1; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    /* ── Print ── */
    @media print {
      header, .btn-sair, .btn-theme, .btn-print,
      #carouselDots, .glossario-btn, #bannerFinalizado { display: none !important; }
      body { background: white !important; color: black !important; }
      main { padding-top: 20px !important; }
      .tl-item { break-inside: avoid; }
    }
  </style>
</head>
<body>

<div id="globalLoader">
  <div class="loader-box">
    <div class="loader-ring"></div>
    <span class="loader-txt">Sincronizando</span>
  </div>
</div>

<header>
  <div class="hdr-brand">
    <div class="hdr-icon"><i class="fas fa-shield-halved"></i></div>
    <span class="hdr-title">Área Segura</span>
  </div>
  <div class="hdr-actions">
    <button class="btn-icon" onclick="toggleDarkMode()"><i id="themeIcon" class="fas fa-moon"></i></button>
    <button class="btn-sair" onclick="logout()">Sair</button>
  </div>
</header>

<main>

  <!-- Boas-vindas -->
  <div class="welcome">
    <p class="welcome-eyebrow">Bem-vindo(a)</p>
    <h2 id="clienteName">...</h2>
    <p id="boasVindasMsg"></p>
  </div>

  <!-- Banner processo finalizado -->
  <div id="bannerFinalizado">
    <i class="fas fa-circle-check"></i>
    <p><strong>Processo Finalizado</strong> — Seu processo foi concluído com êxito. Todos os registros permanecem disponíveis para consulta.</p>
  </div>

  <!-- Banner prazo -->
  <div id="prazoBanner" style="display:none;"></div>

  <!-- Carrossel -->
  <div id="carouselWrap">
    <div id="processCarousel"></div>
  </div>
  <div id="carouselDots" class="hidden"></div>

  <!-- Status cards -->
  <div class="status-grid">
    <div class="status-card wide">
      <div class="sc-label">Status Atual <span class="sc-ping"></span></div>
      <div class="sc-value" id="statusAtual">...</div>
    </div>
    <div class="status-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="sc-label" style="width:100%;justify-content:center;">Progresso</div>
      <div class="progress-wrap">
        <svg class="progress-svg" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26"
            stroke="var(--t-accent-brd, rgba(197,160,89,0.2))" stroke-width="4" fill="none"/>
          <circle id="progressCircle" cx="32" cy="32" r="26"
            stroke="var(--t-accent, #C5A059)" stroke-width="4" fill="none"
            stroke-dasharray="163.4" stroke-dashoffset="163.4"
            stroke-linecap="round"
            style="transition: stroke-dashoffset 1s ease;"/>
        </svg>
        <span id="progressPct" class="progress-pct">0%</span>
      </div>
      <div id="faseLabel" class="progress-fase"></div>
    </div>
    <div class="status-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <div class="sc-label">Eventos</div>
      <div class="sc-value" id="eventCount" style="font-size:32px;">0</div>
      <div style="font-size:10px;color:var(--t-text-muted,#A8A29E);">registrados</div>
    </div>
  </div>

  <!-- Botão imprimir -->
  <button class="btn-print" onclick="window.print()">
    <i class="fas fa-print"></i> Imprimir / Salvar PDF
  </button>

  <!-- Documentos -->
  <div class="docs-section" id="docsSection" style="display:none;">
    <div class="docs-title"><i class="fas fa-paperclip" style="margin-right:6px;opacity:0.7;"></i>Documentos e Links</div>
    <div class="docs-list" id="docsList"></div>
  </div>

  <!-- Timeline -->
  <div class="tl-section">
    <div class="tl-section-title">Linha do Tempo</div>
    <div id="timelineContainer">
      <div class="tl-line"></div>
    </div>
  </div>

</main>

<script src="tema.js"></script>
<script>
// URL_API vem de tema.js — NÃO declarar aqui
let globalData = [];
let activeId   = null;
let scrollTimer = null;
let primeiroAcesso = true; // controla a mensagem de boas-vindas

// ── Init ──────────────────────────────────────────────────
async function init() {
  const sessao = await verificarSessaoComTema('cliente');
  if (!sessao) { _hideLoader(); return; }

  try {
    const res  = await fetch(URL_API, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'timeline' }),
    });
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('clienteName').textContent = sessao.usuario || 'Usuário';
      document.getElementById('statusAtual').textContent  = 'Nenhum processo encontrado.';
      _hideLoader();
      return;
    }

    globalData = data;

    // Boas-vindas personalizadas (apenas no primeiro carregamento)
    const nomeCliente = data[0]?.cliente || sessao.usuario || '';
    document.getElementById('clienteName').textContent = nomeCliente;

    // Verifica se é o primeiro acesso (ultimo_acesso vazio)
    const msgEl = document.getElementById('boasVindasMsg');
    if (primeiroAcesso) {
      msgEl.textContent = `Este é o seu portal exclusivo de acompanhamento processual.`;
      primeiroAcesso = false;
    }

    renderCarousel();

  } catch (err) {
    console.error('Erro ao carregar timeline:', err);
    _mostrarSessaoExpirada();
  } finally {
    _hideLoader();
  }
}

function _hideLoader() {
  const el = document.getElementById('globalLoader');
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => { el.style.display = 'none'; }, 400);
}

// ── Carrossel ─────────────────────────────────────────────
function renderCarousel() {
  const carousel = document.getElementById('processCarousel');
  const dotsWrap = document.getElementById('carouselDots');
  const isSingle = globalData.length === 1;

  if (isSingle) {
    carousel.classList.add('single');
    dotsWrap.classList.add('hidden');
  } else {
    carousel.classList.remove('single');
    dotsWrap.classList.remove('hidden');
  }

  carousel.innerHTML = '';
  globalData.forEach((proc) => {
    const card = document.createElement('div');
    card.className = `proc-card${isSingle ? ' single-card' : ''}`;
    card.dataset.id = proc.id;

    const eyebrow = document.createElement('p');
    eyebrow.className = 'pc-eyebrow';
    eyebrow.textContent = proc.tipo_acao || 'Processo';

    const num = document.createElement('p');
    num.className = 'pc-num';
    num.textContent = proc.numero_processo || 'S/N';

    const obs = document.createElement('p');
    obs.className = 'pc-obs';
    const icon = document.createElement('i');
    icon.className = 'fas fa-circle-info';
    icon.style.cssText = 'color:var(--t-accent,#C5A059);opacity:0.5;font-size:10px;';
    const obsSpan = document.createElement('span');
    obsSpan.textContent = proc.obs || '';
    obs.append(icon, obsSpan);

    card.append(eyebrow, num, obs);
    if (!isSingle) card.addEventListener('click', () => selectProcess(proc.id));
    carousel.appendChild(card);
  });

  // Dots
  dotsWrap.innerHTML = '';
  if (!isSingle) {
    globalData.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.dataset.i  = i;
      dot.onclick = () => {
        const cards = carousel.querySelectorAll('.proc-card');
        if (cards[i]) cards[i].scrollIntoView({ behavior:'smooth', inline:'center' });
      };
      dotsWrap.appendChild(dot);
    });
    _setupCarouselScroll(carousel);
    _setupDraggable(carousel);
  }

  selectProcess(globalData[0].id);
}

function _setupCarouselScroll(carousel) {
  carousel.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      let closest = null, minOff = Infinity;
      carousel.querySelectorAll('.proc-card').forEach(card => {
        const off = Math.abs(card.getBoundingClientRect().left + card.getBoundingClientRect().width/2 - window.innerWidth/2);
        if (off < minOff) { minOff = off; closest = card; }
      });
      if (closest) selectProcess(closest.dataset.id);
    }, 80);
  });
}

function _setupDraggable(slider) {
  let isDown = false, startX, scrollLeft;
  slider.addEventListener('mousedown',  e => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
  slider.addEventListener('mouseleave', () => isDown = false);
  slider.addEventListener('mouseup',    () => isDown = false);
  slider.addEventListener('mousemove',  e => {
    if (!isDown) return;
    const walk = e.pageX - slider.offsetLeft - startX;
    if (Math.abs(walk) > 5) { e.preventDefault(); slider.scrollLeft = scrollLeft - walk; }
  });
}

// ── Selecionar processo ────────────────────────────────────
function selectProcess(id) {
  const proc = globalData.find(p => String(p.id) === String(id));
  if (!proc) return;
  activeId = String(id);

  // Ativar card
  document.querySelectorAll('.proc-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === activeId));

  // Ativar dot
  const idx = globalData.findIndex(p => String(p.id) === activeId);
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));

  // Status atual
  const ats   = Array.isArray(proc.atualizacoes) ? proc.atualizacoes : [];
  const ultimo = ats[ats.length - 1] || { status: 'Aguardando' };
  document.getElementById('statusAtual').textContent = ultimo.status;
  document.getElementById('eventCount').textContent  = ats.length;

  // Processo finalizado?
  const finalizado = ultimo.status === 'Processo Finalizado / Arquivado';
  const bannerFin  = document.getElementById('bannerFinalizado');
  bannerFin.style.display = finalizado ? 'flex' : 'none';

  // Progresso por fase
  const pct    = parseInt(proc.fase_atual, 10) || 10;
  const circum = 2 * Math.PI * 26;
  document.getElementById('progressCircle').style.strokeDashoffset = circum * (1 - pct / 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('faseLabel').textContent   = getFaseLabel(pct); // de tema.js

  // Prazo
  const prazoBanner = document.getElementById('prazoBanner');
  if (proc.prazo) {
    const info = labelPrazo(proc.prazo); // de tema.js
    if (info) {
      prazoBanner.className = `prazo-banner ${info.urgencia}`;
      prazoBanner.innerHTML = `<i class="fas fa-clock" style="flex-shrink:0;"></i><span>${info.texto}</span>`;
    } else { prazoBanner.style.display = 'none'; }
  } else { prazoBanner.style.display = 'none'; }

  // Documentos
  const docs = Array.isArray(proc.documentos) ? proc.documentos.filter(d => d.nome && d.url) : [];
  const docsSection = document.getElementById('docsSection');
  const docsList    = document.getElementById('docsList');
  docsList.innerHTML = '';
  if (docs.length > 0) {
    docsSection.style.display = '';
    docs.forEach(doc => {
      const a = document.createElement('a');
      a.className  = 'doc-btn';
      a.href       = doc.url;
      a.target     = '_blank';
      a.rel        = 'noopener noreferrer';
      a.innerHTML  = `<i class="fas fa-file-lines"></i>`;
      const span   = document.createElement('span');
      span.textContent = doc.nome;
      a.appendChild(span);
      docsList.appendChild(a);
    });
  } else { docsSection.style.display = 'none'; }

  // Timeline
  _renderTimeline(ats, finalizado);
}

// ── Render timeline ────────────────────────────────────────
function _renderTimeline(ats, finalizado) {
  const container = document.getElementById('timelineContainer');
  container.innerHTML = '<div class="tl-line"></div>';

  const GLOSSARIO_KEYS = new Set([
    'Petição Inicial Protocolada','Aguardando Citação',
    'Audiência de Conciliação Designada','Audiência de Instrução e Julgamento',
    'Sentença Proferida','Fase de Execução / Cálculos','Processo Finalizado / Arquivado',
  ]);

  [...ats].reverse().forEach((ev, i) => {
    const isUltimo     = i === 0;
    const isFinalizado = ev.status === 'Processo Finalizado / Arquivado';

    const item = document.createElement('div');
    item.className = `tl-item${isUltimo ? ' ultimo' : ''}${isFinalizado ? ' finalizado' : ''}`;
    item.style.animationDelay = `${i * 0.07}s`;

    const dot = document.createElement('div');
    dot.className = `tl-dot${isFinalizado ? ' finalizado' : ''}`;

    const dateRow = document.createElement('div');
    dateRow.className = 'tl-date';
    dateRow.textContent = formatDate(ev.data); // de tema.js

    const statusRow = document.createElement('div');
    statusRow.className = 'tl-status';

    const statusSpan = document.createElement('span');
    statusSpan.textContent = ev.status || '';
    statusRow.appendChild(statusSpan);

    // Ícone de processo finalizado
    if (isFinalizado) {
      const icon = document.createElement('i');
      icon.className = 'fas fa-circle-check';
      icon.style.cssText = `color:var(--t-success,#60B080);font-size:14px;`;
      statusRow.appendChild(icon);
    }

    // Botão glossário
    if (GLOSSARIO_KEYS.has(ev.status)) {
      const gBtn = document.createElement('button');
      gBtn.className = 'glossario-btn';
      gBtn.title     = 'O que significa isso?';
      gBtn.innerHTML = '<i class="fas fa-circle-question"></i>';
      gBtn.addEventListener('click', () => abrirGlossario(encodeURIComponent(ev.status)));
      statusRow.appendChild(gBtn);
    }

    const desc = document.createElement('p');
    desc.className   = 'tl-desc';
    desc.textContent = ev.descricao || '';

    item.append(dot, dateRow, statusRow, desc);
    container.appendChild(item);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
